services:
  postgres:
    image: postgres:16
    container_name: hcp_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - hcp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hcp_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hcp_pg_data:
